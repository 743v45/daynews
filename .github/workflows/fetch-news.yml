name: Fetch News

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fetch
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: 'latest'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/deno
            deno.lock
          key: ${{ runner.os }}-deno-${{ hashFiles('deno.json', 'scripts/*.ts') }}

      - name: Install opencode
        run: npm install -g opencode-ai

      - name: Fetch RSS feeds
        run: deno run --allow-net --allow-read --allow-write scripts/fetch-rss.ts
        timeout-minutes: 5

      - name: Summarize articles with opencode
        run: deno run --allow-net --allow-read --allow-write --allow-run --allow-env scripts/summarize.ts
        timeout-minutes: 30
        env:
          OPENCODE_NO_AUTO_EXECUTE: '1'

      - name: Show opencode stats
        run: opencode stats

      - name: Generate Hugo content
        run: deno run --allow-read --allow-write scripts/generate-hugo.ts

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add articles/ content/news/
          git diff --staged --quiet || git commit -m "chore: daily news update [skip ci]"
          git pull --rebase origin master
          git push
