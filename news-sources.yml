# RSS 新闻源配置
# 可添加多个 RSS feed，每天自动抓取

sources:
  - name: "Hacker News"
    url: "https://hnrss.org/frontpage"
    category: "科技"
    enabled: true

  - name: "TechCrunch"
    url: "https://techcrunch.com/feed/"
    category: "科技"
    enabled: true

  - name: "36氪"
    url: "https://36kr.com/feed"
    category: "科技"
    enabled: true

  - name: "Reuters Technology"
    url: "https://feeds.reuters.com/reuters/technologyNews"
    category: "科技"
    enabled: true

  - name: "Ars Technica"
    url: "https://feeds.arstechnica.com/arstechnica/index"
    category: "科技"
    enabled: true

  - name: "BBC News"
    url: "https://feeds.bbci.co.uk/news/rss.xml"
    category: "综合"
    enabled: true

  - name: "卫报"
    url: "https://www.theguardian.com/world/rss"
    category: "综合"
    enabled: true

# AI 总结配置
summary:
  # 调用 opencode 使用的模型
  model: "opencode/deepseek-v4-flash-free"
  # 摘要语言
  language: "zh-cn"
  # 每篇文章最大摘要字数
  max_summary_length: 150
  # 每次调用处理的最大文章数（防止超时）
  batch_size: 5
