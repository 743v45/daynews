{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">
      <a href="{{ .Params.sourceUrl }}" target="_blank" rel="noopener">{{ .Title }}</a>
    </h1>
    <div class="post-meta">
      <span>来源: <strong>{{ .Params.source }}</strong></span>
      <span>分类: {{ .Params.category }}</span>
      <time>{{ .Date.Format "2006年1月2日 15:04" }}</time>
    </div>
  </header>

  <div class="post-content">
    {{ .Content }}
  </div>

</article>
{{ end }}
